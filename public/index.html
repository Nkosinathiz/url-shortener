<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 80px auto;
      padding: 0 20px;
    }
    h1 { margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    #result {
      margin-top: 24px;
      font-size: 18px;
    }
    #result a { color: #0070f3; }
  </style>
</head>
<body>
  <h1>URL Shortener</h1>
  <input type="text" id="urlInput" placeholder="Paste your long URL here..." />
  <br/>
  <button onclick="shorten()">Shorten</button>
  <div id="result"></div>

  <script>
    async function shorten() {
      const url = document.getElementById('urlInput').value;
      const res = await fetch('/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.short_url) {
        document.getElementById('result').innerHTML =
          `Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
      } else {
        document.getElementById('result').textContent = 'Something went wrong.';
      }
    }
  </script>
</body>
</html>
